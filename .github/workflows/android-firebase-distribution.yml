name: Android Build & Firebase Distribution

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for this build"
        required: false
        default: "New build from CI"

# Required GitHub Secrets:
#
#   KEYSTORE_BASE64        — base64-encoded credlock-release.jks
#                            Generate with: base64 -w 0 android/credlock-release.jks
#
#   KEY_ALIAS              — keyAlias value from key.properties
#   KEY_PASSWORD           — keyPassword value from key.properties
#   STORE_PASSWORD         — storePassword value from key.properties
#
#   GOOGLE_SERVICES_JSON   — full contents of android/app/google-services.json
#
#   FIREBASE_APP_ID        — Firebase Android App ID
#                            e.g. 1:930123015480:android:410fca1aa92cfb33650dcd
#
#   FIREBASE_SERVICE_ACCOUNT_JSON — Google service account JSON with
#                                   Firebase App Distribution Admin role
#                                   (create at console.firebase.google.com →
#                                    Project Settings → Service accounts)

jobs:
  build-and-distribute:
    name: Build APK & Distribute via Firebase
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      # ── Restore secrets ───────────────────────────────────────────────────
      - name: Restore keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/credlock-release.jks

      - name: Restore key.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../credlock-release.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > android/key.properties

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: credlock-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ── Firebase App Distribution ─────────────────────────────────────────
      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: ${{ github.event.inputs.release_notes || format('Build from {0} — {1}', github.ref_name, github.sha) }}
